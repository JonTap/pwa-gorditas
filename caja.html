<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 20px;">
    <h1>CAJA</h1>
    <div id="lista-caja"></div>
    <script>
        const URL = "https://pwa-4e890-default-rtdb.firebaseio.com/pedidos";
        async function sync() {
            const res = await fetch("https://pwa-4e890-default-rtdb.firebaseio.com/pedidos.json");
            const data = await res.json() || {};
            const cont = document.getElementById('lista-caja'); 
            cont.innerHTML = "";
        
            for (let id in data) {
                const p = data[id];
                cont.innerHTML += `
                    <div class="item" style="background:var(--item-bg); margin-bottom:10px; border-radius:10px; padding:15px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--separator);">
                        <div>
                            <div style="font-size:12px; color:gray">Orden: ${p.orderId}</div>
                            <strong style="font-size:18px">${p.id}</strong>
                            <div style="color:var(--accent); font-weight:bold; font-size:20px">${p.total}</div>
                        </div>
                        <button onclick="cobrar('${id}')" style="background:var(--accent); color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:bold; cursor:pointer">
                            COBRAR
                        </button>
                    </div>`;
            }
        }
        async function cobrar(id) {
            if(confirm("¿Pedido entregado y cobrado?")) {
                await fetch(`${URL}/${id}.json`, { method: 'DELETE' }); sync();
            }
        }
        setInterval(sync, 5000); sync();
    </script>
</body>
</html>
