<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pantalla de Seguimiento - El Sazón</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1C1C1E;
            --text-main: #FFFFFF;
            --text-sec: #8E8E93;
            --prep: #FF9F0A; /* Naranja Apple */
            --ready: #30D158; /* Verde Apple */
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .column:last-child { border-right: none; }

        h2 {
            text-align: center;
            font-size: 2rem;
            padding: 20px;
            margin: 0;
            background: rgba(255,255,255,0.05);
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
            align-content: start;
        }

        /* TARJETAS DE ORDEN */
        .order-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .order-id {
            font-size: 4rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
        }

        .order-meta {
            font-size: 1.2rem;
            color: var(--text-sec);
            margin-top: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ESTADOS */
        .col-prep h2 { color: var(--prep); }
        .col-prep .order-id { color: var(--prep); }

        .col-ready h2 { color: var(--ready); }
        .col-ready .order-card { 
            border: 2px solid var(--ready); 
            animation: pulse 2s infinite;
        }
        .col-ready .order-id { color: var(--ready); }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(48, 209, 88, 0); }
            100% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0); }
        }

        #audio-ding { display: none; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.5rem; color: var(--text-sec);">ORDENES EN TIEMPO REAL</h1>
</header>

<div class="container">
    <div class="column col-prep">
        <h2>EN PREPARACIÓN</h2>
        <div id="grid-prep" class="grid"></div>
    </div>
    <div class="column col-ready">
        <h2>LISTOS</h2>
        <div id="grid-ready" class="grid"></div>
    </div>
</div>

<audio id="audio-ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const FIREBASE_URL = "https://pwa-4e890-default-rtdb.firebaseio.com/pedidos.json";
    let memoriaEstado = {};

    async function updateTV() {
        try {
            // 1. ASEGÚRATE de que la URL termine en .json
            const res = await fetch("https://pwa-4e890-default-rtdb.firebaseio.com/pedidos.json");
            const data = await res.json();
            
            const gridPrep = document.getElementById('grid-prep');
            const gridReady = document.getElementById('grid-ready');
            const ding = document.getElementById('audio-ding');
    
            // Limpiar pantallas antes de actualizar
            gridPrep.innerHTML = "";
            gridReady.innerHTML = "";
    
            if (!data) return; // Si no hay pedidos, salir
    
            for (let key in data) {
                const p = data[key];
    
                // SEGURIDAD: Si el pedido no tiene estado o ID, ignorarlo para que no rompa el código
                if (!p.status || !p.id) continue;
    
                // 2. FILTRO EXPLÍCITO: Solo mostrar lo que está en preparación o listo
                if (p.status === "completado") continue; // IGNORAR los ya pagados
    
                // Formatear el ID para mostrar (ej: "5" en lugar de "Mesa 5")
                const displayId = p.id.toString().replace("Mesa ", "").replace("Mesa: ", "");
                const shortId = p.orderId ? p.orderId.slice(-4).toUpperCase() : "---";
    
                if (p.status === "preparando") {
                    // --- SECCIÓN EN PREPARACIÓN ---
                    const card = document.createElement('div');
                    card.className = 'order-card';
                    card.innerHTML = `
                        <div class="order-id">${shortId}</div>
                        <div class="order-meta">${displayId}</div>
                    `;
                    gridPrep.appendChild(card);
                } 
                else if (p.status === "listo") {
                    // --- SECCIÓN LISTOS (Con cronómetro de 5 min) ---
                    const ahora = Date.now();
                    const tiempoListo = p.readyTimestamp || ahora;
                    const transcurridoS = Math.floor((ahora - tiempoListo) / 1000);
                    const limiteS = 300; // 5 minutos
                    const restanteS = limiteS - transcurridoS;
    
                    if (restanteS > 0) {
                        const card = document.createElement('div');
                        card.className = 'order-card';
                        card.innerHTML = `
                            <div class="order-id">${shortId}</div>
                            <div class="order-meta">${displayId}</div>
                            <div style="font-size:0.8rem; margin-top:5px; color:#30D158">
                                Expira: ${Math.floor(restanteS/60)}:${(restanteS%60).toString().padStart(2,'0')}
                            </div>
                        `;
                        gridReady.appendChild(card);
    
                        // Sonido si acaba de pasar a listo
                        if (memoriaEstado[key] === "preparando") {
                            ding.play().catch(() => {});
                        }
                    }
                }
                // Guardar estado en memoria para el sonido
                memoriaEstado[key] = p.status;
            }
        } catch (e) {
            console.error("Error cargando TV:", e);
        }
    }

    // El navegador requiere una interacción para habilitar el sonido
    window.onclick = () => {
        document.getElementById('audio-ding').play();
        console.log("Sonido habilitado");
    };

    setInterval(updateTV, 4000);
    updateTV();
</script>
</body>
</html>
