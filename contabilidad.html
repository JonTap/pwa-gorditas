<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contabilidad - El Sazón</title>
    <style>
        :root { --bg: #f2f2f7; --text: #000; --accent: #007aff; }
        body { font-family: system-ui; background: var(--bg); padding: 20px; }
        .filter-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--accent); color: white; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .preparando { background: #ffe6c4; color: #ff9f0a; }
        .listo { background: #cfffd5; color: #30d158; }
        .completado { background: #d1d1d6; color: #8e8e93; }
        tr:hover { background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>📊 Reporte de Ventas</h1>
    
    <div class="filter-bar">
        <span>Filtrar Fecha:</span>
        <input type="date" id="fechaFiltro">
        <button onclick="cargarDatos()" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer">Filtrar</button>
        <button onclick="resetFiltro()" style="border:none; padding:8px 15px; border-radius:6px; cursor:pointer">Hoy</button>
    </div>

    <table id="tabla-contabilidad">
        <thead>
            <tr>
                <th>Orden</th>
                <th>Mesa/Cliente</th>
                <th>Hora</th>
                <th>Total</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="lista-ventas"></tbody>
    </table>

    <script>
        const URL = "https://pwa-4e890-default-rtdb.firebaseio.com/pedidos.json";

        async function cargarDatos() {
            const res = await fetch(URL);
            const data = await res.json() || {};
            const lista = document.getElementById('lista-ventas');
            const filtro = document.getElementById('fechaFiltro').value; // Formato YYYY-MM-DD
            
            lista.innerHTML = "";
            let totalDia = 0;

            for (let id in data) {
                const p = data[id];
                const fechaPedido = new Date(p.timestamp).toISOString().split('T')[0];

                // Filtro por fecha (Si no hay filtro, muestra todo)
                if (filtro && filtro !== fechaPedido) continue;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><code>${p.orderId}</code></td>
                    <td>${p.id}</td>
                    <td>${p.hora}</td>
                    <td><strong>${p.total}</strong></td>
                    <td><span class="badge ${p.status}">${p.status.toUpperCase()}</span></td>
                `;
                lista.appendChild(row);

                // Sumar total si está completado (extrayendo número del string "$150")
                if (p.status === "completado") {
                    totalDia += parseFloat(p.total.replace('$', '')) || 0;
                }
            }
            
            // Mostrar un pie de tabla con el resumen
            const totalRow = document.createElement('tr');
            totalRow.innerHTML = `<td colspan="3" style="text-align:right"><strong>Total Cobrado:</strong></td><td colspan="2"><strong>$${totalDia.toFixed(2)}</strong></td>`;
            lista.appendChild(totalRow);
        }

        function resetFiltro() {
            document.getElementById('fechaFiltro').value = new Date().toISOString().split('T')[0];
            cargarDatos();
        }

        // Cargar por defecto hoy
        resetFiltro();
    </script>
</body>
</html>
